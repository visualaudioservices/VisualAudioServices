<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Audio Services</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="site" aria-label="Visual Audio Services website">
    <img src="assets/mockup.png" alt="Visual Audio Services - sound, lighting, AV hire, music production and event support" />

    <!-- Transparent clickable areas laid over the exact mockup image -->
    <a class="hotspot nav-home" href="#home" aria-label="Home"></a>
    <a class="hotspot nav-services" href="#services" aria-label="Services"></a>
    <a class="hotspot nav-hire" href="#hire" aria-label="Hire"></a>
    <a class="hotspot nav-contact" href="#contact" aria-label="Contact"></a>
    <a class="hotspot book" href="mailto:youremail@example.com?subject=Visual%20Audio%20Services%20Booking" aria-label="Book Now"></a>
    <a class="hotspot send" href="mailto:youremail@example.com?subject=Visual%20Audio%20Services%20Enquiry" aria-label="Send Message"></a>

    <!-- Invisible anchors so the URL sections still work -->
    <span id="home"></span>
    <span id="services"></span>
    <span id="hire"></span>
    <span id="contact"></span>
  </main>
</body>
</html>
